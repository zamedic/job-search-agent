name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build, Push and Deploy
    runs-on: [self-hosted, labradoc, job-search-agent]
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        # The summerwind/actions-runner image doesn't ship kubectl; install
        # the same version the cluster uses. Matches the labradoc-app pattern.
        run: |
          curl -sLo /tmp/kubectl "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install -o root -g root -m 0755 /tmp/kubectl /usr/local/bin/kubectl
          kubectl version --client

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: image
        run: echo "sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build and push
        run: |
          docker build -t ghcr.io/zamedic/job-search-agent:${{ steps.image.outputs.sha }} .
          docker tag ghcr.io/zamedic/job-search-agent:${{ steps.image.outputs.sha }} ghcr.io/zamedic/job-search-agent:latest
          docker push ghcr.io/zamedic/job-search-agent:${{ steps.image.outputs.sha }}
          docker push ghcr.io/zamedic/job-search-agent:latest

      - name: Apply RBAC first
        # The runner needs secrets access to upsert the API key. Apply
        # the role + binding explicitly before anything else so this
        # step doesn't depend on the secret step succeeding.
        run: |
          kubectl apply -f k8s/rbac-role.yaml
          kubectl apply -f k8s/rbac-binding.yaml

      - name: Ensure MiniMax API key secret exists in marcarndt namespace
        # Reads the API key from the repo's GitHub Actions secrets and
        # upserts it as a k8s secret in the marcarndt namespace. The
        # deployment's env stanza reads MINIMAX_API_KEY from this secret.
        # Required secret: MINIMAX_API_KEY (repo or org level).
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: |
          if [ -z "$MINIMAX_API_KEY" ]; then
            echo "::error::MINIMAX_API_KEY secret is not set on this repo."
            echo "Add it at: https://github.com/zamedic/job-search-agent/settings/secrets/actions"
            exit 1
          fi
          kubectl create secret generic job-search-agent-secrets \
            --namespace=marcarndt \
            --from-literal=minimax-api-key="$MINIMAX_API_KEY" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply remaining manifests
        # Deployment, service, PVC, middleware, ingress. RBAC was applied
        # in the previous step; the secret was just upserted above.
        run: kubectl apply -k k8s/

      - name: Rollout image
        # Force the deployment to pick up the new image even if the
        # manifest tag didn't change (k8s won't auto-roll on tag reuse).
        run: |
          kubectl set image deployment/job-search-agent app=ghcr.io/zamedic/job-search-agent:${{ steps.image.outputs.sha }} -n marcarndt
          kubectl rollout status deployment/job-search-agent -n marcarndt --timeout=120s

      - name: Verify
        run: |
          echo "=== pods ==="
          kubectl get pods -n marcarndt -l app=job-search-agent
          echo "=== ingress ==="
          kubectl get ingress -n marcarndt job-search-agent
          echo "=== health probe ==="
          # The Traefik strip middleware forwards /api/health to /api/health
          # on the backend. Hit the public URL to confirm end-to-end.
          for i in 1 2 3 4 5; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" https://marcarndt.com/job-search-agent/api/health)
            if [ "$code" = "200" ]; then
              echo "health OK: HTTP $code"
              exit 0
            fi
            echo "attempt $i: HTTP $code, retrying in 5s"
            sleep 5
          done
          echo "health check failed"
          exit 1
