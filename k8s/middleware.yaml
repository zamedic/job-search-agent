---
# Traefik middleware that strips the /job-search-agent path prefix before
# forwarding the request to the backend. Without this the app would see
# /job-search-agent/api/... and need to be path-aware.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: job-search-agent-strip
  namespace: marcarndt
spec:
  stripPrefix:
    prefixes:
      - /job-search-agent
